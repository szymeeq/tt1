<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Mapa Taco Hemingwaya</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" type="image" href="ikony/logo.png"> 
</head>
<body>
<button id="mobile-filter-btn">
    🔍 Filtruj (<span id="count-mobile">0</span>)
</button>
    <div id="container">
<div id="sidebar">
    <h2>Mapa Taco Hemingwaya<img src="wwa1.png" alt="mapa taco hemingway"></h2>
    
    <div class="search-box">
        <input type="text" id="search-input" placeholder="Szukaj miejsca lub cytatu...">
    </div>

    <button id="btn-all" style="width: 100%; padding: 10px; margin-bottom: 20px; cursor: pointer; background: #e67e22; border: none; color: white; border-radius: 5px; font-weight: bold;">
        POKAŻ WSZYSTKO
    </button>

<div class="filter-group">
    <h3 style="font-size: 16px; border-bottom: 1px solid #333; padding-bottom: 10px;">Filtruj kategorie:</h3>
    <div id="category-tags" style="display: flex; flex-wrap: wrap; gap: 5px; margin-top: 10px;"></div>
</div>

<div class="filter-group" style="margin-top: 20px;">
    <h3 style="font-size: 16px; border-bottom: 1px solid #333; padding-bottom: 10px;">Filtruj albumy:</h3>
    <div id="album-tags" style="display: flex; flex-wrap: wrap; gap: 5px; margin-top: 10px;"></div>
</div>

    <div id="results-count" style="margin-top: auto; padding: 10px; background: #111; border-radius: 5px;">
        Znaleziono: <span id="count" style="color: #e67e22; font-weight: bold;">0</span> miejsc
    </div>
</div>

        <div id="map"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="script.js"></script>
</body>
</html>
